<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle}">Subject Form</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="shell"><aside class="sidebar"><div class="brand"><h2>SMS</h2><span>School admin panel</span></div><nav class="nav"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/students}">Students</a><a th:href="@{/teachers}">Teachers</a><a th:href="@{/classes}">Classes</a><a class="active" th:href="@{/subjects}">Subjects</a><a th:href="@{/logout}">Logout</a></nav></aside><main class="content">
    <section class="form-panel"><div class="form-head"><h2 th:text="${pageTitle}">Subject Form</h2><a class="button secondary" th:href="@{/subjects}">Back</a></div><form th:action="@{/subjects/save}" th:object="${subject}" method="post"><div class="form-body"><input type="hidden" th:field="*{id}"><div class="form-grid"><div class="field"><label>Subject Name</label><input type="text" th:field="*{name}" required></div><div class="field"><label>Subject Code</label><input type="text" th:field="*{code}" required></div></div><br><button type="submit">Save Subject</button></div></form></section>
</main></div></body></html>
