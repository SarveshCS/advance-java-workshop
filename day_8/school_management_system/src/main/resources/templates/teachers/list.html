<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Teachers</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="shell"><aside class="sidebar"><div class="brand"><h2>SMS</h2><span>School admin panel</span></div><nav class="nav"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/students}">Students</a><a class="active" th:href="@{/teachers}">Teachers</a><a th:href="@{/classes}">Classes</a><a th:href="@{/subjects}">Subjects</a><a th:href="@{/logout}">Logout</a></nav></aside><main class="content">
    <div class="topbar"><div class="page-title"><h1>Teachers</h1><p>Maintain teacher records, subject ownership, and class assignments.</p></div><a class="button" th:href="@{/teachers/new}">Add Teacher</a></div>
    <div class="message" th:if="${message}" th:text="${message}"></div><section class="panel"><table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Subject</th><th>Assigned Class</th><th>Actions</th></tr></thead><tbody><tr th:each="teacher : ${teachers}"><td th:text="${teacher.name}">Name</td><td th:text="${teacher.email}">Email</td><td th:text="${teacher.phone}">Phone</td><td th:text="${teacher.assignedSubject}">Subject</td><td><span class="badge" th:text="${assignedClasses[teacher.id] != null ? assignedClasses[teacher.id] : 'Not assigned'}">Not assigned</span></td><td><div class="actions"><a class="button warning" th:href="@{/teachers/edit/{id}(id=${teacher.id})}">Edit</a><a class="button danger" th:href="@{/teachers/delete/{id}(id=${teacher.id})}">Delete</a></div></td></tr></tbody></table><div class="empty" th:if="${#lists.isEmpty(teachers)}">No teachers added yet.</div></section>
</main></div></body></html>
