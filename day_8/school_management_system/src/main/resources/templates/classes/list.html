<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Classes</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="shell"><aside class="sidebar"><div class="brand"><h2>SMS</h2><span>School admin panel</span></div><nav class="nav"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/students}">Students</a><a th:href="@{/teachers}">Teachers</a><a class="active" th:href="@{/classes}">Classes</a><a th:href="@{/subjects}">Subjects</a><a th:href="@{/logout}">Logout</a></nav></aside><main class="content">
    <div class="topbar"><div class="page-title"><h1>Classes</h1><p>Assign a class teacher and subjects to each class.</p></div><a class="button" th:href="@{/classes/new}">Add Class</a></div>
    <div class="message" th:if="${message}" th:text="${message}"></div><section class="panel"><table><thead><tr><th>Class</th><th>Class Teacher</th><th>Subjects</th><th>Actions</th></tr></thead><tbody><tr th:each="schoolClass : ${classes}"><td th:text="${schoolClass.displayName}">Class</td><td th:text="${schoolClass.classTeacher != null ? schoolClass.classTeacher.name : 'Not assigned'}">Teacher</td><td><div class="badge-list"><span class="badge" th:each="subject : ${schoolClass.subjects}" th:text="${subject.name}">Subject</span></div></td><td><div class="actions"><a class="button warning" th:href="@{/classes/edit/{id}(id=${schoolClass.id})}">Edit</a><a class="button danger" th:href="@{/classes/delete/{id}(id=${schoolClass.id})}">Delete</a></div></td></tr></tbody></table><div class="empty" th:if="${#lists.isEmpty(classes)}">No classes added yet.</div></section>
</main></div></body></html>
