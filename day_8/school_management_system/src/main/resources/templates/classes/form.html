<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle}">Class Form</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body><div class="shell"><aside class="sidebar"><div class="brand"><h2>SMS</h2><span>School admin panel</span></div><nav class="nav"><a th:href="@{/dashboard}">Dashboard</a><a th:href="@{/students}">Students</a><a th:href="@{/teachers}">Teachers</a><a class="active" th:href="@{/classes}">Classes</a><a th:href="@{/subjects}">Subjects</a><a th:href="@{/logout}">Logout</a></nav></aside><main class="content">
    <section class="form-panel"><div class="form-head"><h2 th:text="${pageTitle}">Class Form</h2><a class="button secondary" th:href="@{/classes}">Back</a></div><form th:action="@{/classes/save}" th:object="${schoolClass}" method="post"><div class="form-body"><input type="hidden" th:field="*{id}"><div class="form-grid">
        <div class="field"><label>Class Name</label><input type="text" th:field="*{className}" placeholder="Class 10" required></div><div class="field"><label>Section</label><input type="text" th:field="*{section}" placeholder="A" required></div>
        <div class="field" data-picker><label>Class Teacher</label><input type="search" data-picker-input list="teacher-options" th:value="${schoolClass.classTeacher != null ? schoolClass.classTeacher.name : ''}" placeholder="Search teacher"><input type="hidden" name="teacherId" data-picker-hidden th:value="${schoolClass.classTeacher != null ? schoolClass.classTeacher.id : ''}"><datalist id="teacher-options"><option th:each="teacher : ${teachers}" th:value="${teacher.name}" th:attr="data-id=${teacher.id}"></option></datalist><small class="hint">Selecting a teacher here also updates that teacher's assigned class.</small></div>
        <div class="field"><label>Subjects</label><select name="subjectIds" multiple><option th:each="subject : ${subjects}" th:value="${subject.id}" th:text="${subject.name}" th:selected="${selectedSubjectIds.contains(subject.id)}"></option></select></div>
    </div><br><button type="submit">Save Class</button></div></form></section>
</main></div><script th:src="@{/js/app.js}"></script></body></html>
